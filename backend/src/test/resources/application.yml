spring:
  datasource:
    url: jdbc:h2:mem:compliance-${random.uuid};MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

app:
  security:
    demo-enabled: true
    demo-password: demo-change-me
    admin-password: admin-change-me
  llm:
    provider: mock
