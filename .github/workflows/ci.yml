name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    name: Backend (Maven)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Run tests
        env:
          LLM_PROVIDER: mock
        run: mvn -B clean test

  frontend:
    name: Frontend (Vite build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

  docker-dev-smoke:
    name: Docker dev smoke
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Build and start backend (dev compose)
        env:
          LLM_PROVIDER: mock
        run: |
          docker compose build backend
          docker compose up -d backend

      - name: Wait for health
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8080/api/health | grep -q '"llmProvider":"mock"'; then
              echo "Smoke OK: backend healthy with mock LLM"
              exit 0
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 5
          done
          docker compose logs backend
          exit 1

      - name: Tear down
        if: always()
        run: docker compose down -v
