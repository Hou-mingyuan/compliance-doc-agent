name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    name: Backend (Maven)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Run tests
        env:
          LLM_PROVIDER: mock
        run: mvn -B clean test

  frontend:
    name: Frontend (quality and build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Type check
        run: npm run typecheck

      - name: Dependency audit
        run: npm audit --audit-level=high

      - name: Build
        run: npm run build

  docker-dev-smoke:
    name: Docker full-stack acceptance
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Validate Compose configuration
        run: docker compose config --quiet

      - name: Build and start full stack
        env:
          LLM_PROVIDER: mock
        run: docker compose up -d --build

      - name: Wait for application health
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:19070/api/health | grep -q '"llmProvider":"mock"'; then
              echo "Application healthy with mock LLM"
              exit 0
            fi
            echo "Waiting for application... ($i/60)"
            sleep 5
          done
          docker compose logs --no-color
          exit 1

      - name: Run complete acceptance workflow
        run: >-
          python3 scripts/verify-complete.py
          --base http://127.0.0.1:19070
          --evidence-dir docs/evidence/ci-acceptance

      - name: Show service logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Upload acceptance evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compliance-acceptance-evidence
          path: docs/evidence/ci-acceptance
          if-no-files-found: ignore
          retention-days: 7

      - name: Tear down
        if: always()
        run: docker compose down -v
