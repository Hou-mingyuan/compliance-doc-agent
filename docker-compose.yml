# compliance-doc-agent · Docker Compose
#
# 开发模式（Vite 热更新，默认）：
#   cp .env.example .env
#   docker compose up -d --build
#
# 生产模式（Nginx 托管静态前端）：
#   docker compose --profile prod up -d --build
#
# 可选 H2 文件持久化：
#   docker compose --profile h2-persist up -d --build
#   并在 .env 中将 SPRING_DATASOURCE_URL 改为 file 模式（见 .env.example）
#
# 端口（开发）：
#   后端 API  http://localhost:8080/api/health
#   前端界面  http://localhost:5173
#
# 端口（生产 --profile prod）：
#   统一入口  http://localhost:8080  （Nginx → 静态 + /api 反代）

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "8080"
    ports:
      - "${BACKEND_HOST_PORT:-8080}:8080"
    volumes:
      - h2data:/data
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:h2:mem:compliance;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.h2.Driver
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-sa}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.openai.com/v1}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.2}
      LLM_TIMEOUT: ${LLM_TIMEOUT:-90}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s

  frontend-dev:
    image: node:22-alpine
    profiles: ["dev"]
    working_dir: /app
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    command: ["sh", "-c", "npm install && npm run dev -- --host 0.0.0.0 --port 5173"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    profiles: ["prod"]
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    # Nginx 反代 /api → backend:8080（见 frontend/nginx.conf）

volumes:
  h2data:
    driver: local
  frontend_node_modules:
    driver: local
