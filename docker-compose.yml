# compliance-doc-agent · Docker Compose
#
# Mock 零密钥一键启动（后端 + Nginx 静态前端）：
#   docker compose up -d --build
#
# 端口：
#   后端 API  http://localhost:19071/api/health
#   前端界面  http://localhost:19070

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "19071"
    ports:
      - "${BACKEND_HOST_PORT:-19071}:19071"
    volumes:
      - h2data:/data
    environment:
      SERVER_PORT: 19071
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:h2:file:/data/compliance;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_ON_EXIT=FALSE}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.h2.Driver
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-sa}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.openai.com/v1}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.2}
      LLM_TIMEOUT: ${LLM_TIMEOUT:-90}
      DEMO_AUTH_ENABLED: ${DEMO_AUTH_ENABLED:-true}
      DEMO_BCRYPT_STRENGTH: ${DEMO_BCRYPT_STRENGTH:-8}
      DEMO_USER_PASSWORD: ${DEMO_USER_PASSWORD:-demo-change-me}
      DEMO_ADMIN_PASSWORD: ${DEMO_ADMIN_PASSWORD:-admin-change-me}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:19071/api/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-19070}:19070"
    # Nginx 反代 /api → backend:19071（见 frontend/nginx.conf）

volumes:
  h2data:
    driver: local
